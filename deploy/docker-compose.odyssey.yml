services:
  odyssey:
    container_name: odyssey-app
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/}
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy
    env_file:
      - ./.env
      - ../odyssey.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      CLIENT_DIST_PATH: /app/client-dist
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      PUBLIC_SUPABASE_URL: /supabase
      PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""
      GOOGLE_AI_API_KEY: ""
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_BASE_URL: ${AZURE_OPENAI_BASE_URL:-https://ai-jasavatt8102ai495392122451.openai.azure.com/openai/v1}
      AZURE_OPENAI_MODEL: ${AZURE_OPENAI_MODEL:-gpt-5.4-2}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r) => { if (!r.ok) process.exit(1); })"]
      interval: 10s
      timeout: 5s
      retries: 10
